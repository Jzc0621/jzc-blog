    </div>
    <form action="/editor/save" method="POST" id="editorFormInner">
      <input type="hidden" name="mode" value="note">
      <input type="hidden" name="original_slug" id="originalSlug" value="">

      
      <div class="mb-16">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">标题（可选）</label>
        <input class="input input-lg" name="title" placeholder="便签标题，留空则自动生成">
      </div>
      <input type="hidden" name="tag" value="便签">
      

      <div class="mb-16">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">正文 (Markdown)</label>
        <textarea class="textarea" name="content" placeholder="在这里写内容...&#10;&#10;## 二级标题&#10;&#10;正文...&#10;&#10;```python&#10;print('hello')&#10;```" required></textarea>
      </div>

      <div class="flex-row gap-12">
        <button type="submit" class="btn btn-primary btn-lg">保存便签</button>
        <a href="/" class="btn">取消</a>
      </div>
    </form>

    
  </div>

</div>

<script>
// SHA-256 password verification
// To change password, generate a new hash:
//   python -c "import hashlib; print(hashlib.sha256('newpassword'.encode()).hexdigest())"
var PASSWORD_HASH = '0e7a5ad21c4ff6640d10f20362381f026788b60c4c15b3186457c7c122d804aa';

function sha256(message) {
  var msgBuffer = new TextEncoder().encode(message);
  return crypto.subtle.digest('SHA-256', msgBuffer).then(function(hashBuffer) {
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  });
}

function checkPwd() {
  var input = document.getElementById('pwdInput').value;
  sha256(input).then(function(hash) {
    if (hash === PASSWORD_HASH) {
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('editorForm').style.display = '';
      loadPostList();
    } else {
      document.getElementById('pwdError').style.display = '';
    }
  });
}

var _postListLoaded = false;
function loadPostList() {
  if (_postListLoaded) return;
  _postListLoaded = true;
  fetch('/editor/list')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var container = document.getElementById('postList');
      if (!d.posts || !d.posts.length) {
        container.innerHTML = '<p class="text-muted">还没有文章</p>';
        return;
      }
      container.innerHTML = d.posts.map(function(p) {
        var badge = p.status === 'draft' ? ' <span style="font-size:10px;color:var(--text-disabled);">[草稿]</span>' : '';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);">' +
          '<span><a href="/post/' + p.slug + '" style="font-weight:600;">' + escapeHtml(p.title) + '</a>' + badge +
          ' <span style="font-size:11px;color:var(--text-disabled);">' + p.date + ' · #' + p.tag + '</span></span>' +
          '<span style="display:flex;gap:6px;">' +
          '<button class="btn btn-sm" onclick="editPost(\'' + p.slug + '\')">编辑</button>' +
          '<button class="btn btn-sm" onclick="deletePost(\'' + p.slug + '\', this)" style="color:var(--error);border-color:var(--error);">删除</button>' +
          '</span>' +
          '</div>';
      }).join('');
    });
}

function deletePost(slug, btn) {
  if (!confirm('确定要删除这篇文章吗？此操作不可撤销。')) return;
  btn.disabled = true;
  btn.textContent = '...';
  fetch('/editor/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'slug=' + encodeURIComponent(slug)
  }).then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        btn.closest('div').remove();
      } else {
        alert('删除失败: ' + (d.error || 'unknown'));
        btn.disabled = false;
        btn.textContent = '删除';
      }
    });
}

var _editingSlug = null;

function editPost(slug) {
  fetch('/editor/get/' + slug)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { alert('加载失败: ' + d.error); return; }
      var form = document.getElementById('editorFormInner');
      form.querySelector('[name="title"]').value = d.title;
      form.querySelector('[name="content"]').value = d.content;
      form.querySelector('[name="tag"]').value = d.tag;
      document.getElementById('originalSlug').value = d.slug;
      document.getElementById('editBanner').style.display = '';
      document.getElementById('editBannerTitle').textContent = d.title;
      form.querySelector('button[type="submit"]').textContent = '更新文章';
      _editingSlug = slug;
      window.scrollTo({top: 0, behavior: 'smooth'});
    });
}

function cancelEdit() {
  var form = document.getElementById('editorFormInner');
  form.querySelector('[name="title"]').value = '';
  form.querySelector('[name="content"]').value = '';
  document.getElementById('originalSlug').value = '';
  document.getElementById('editBanner').style.display = 'none';
  form.querySelector('button[type="submit"]').textContent = '发布文章';
  _editingSlug = null;
}

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
