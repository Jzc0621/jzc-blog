<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DRIFT{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2225%22 y=%2275%22 font-size=%2280%22 font-family=%22monospace%22 font-weight=%22700%22 fill=%22%2319c8b9%22>&gt;</text></svg>">
  <meta name="description" content="{% block meta_desc %}技术、生活，和随手笔记{% endblock %}">
  <meta property="og:title" content="{% block og_title %}DRIFT{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}技术、生活，和随手笔记{% endblock %}">
  <meta property="og:type" content="website">
  {% block canonical %}<link rel="canonical" href="{{ site_url }}{{ request.path }}">{% endblock %}
  <meta property="og:image" content="{{ site_url }}/static/images/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="DRIFT">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Press+Start+2P&display=swap" media="print" onload="this.media='all';this.onload=null">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Press+Start+2P&display=swap"></noscript>
  <script>var f=document.createElement('link');f.rel='stylesheet';f.href='https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&family=Press+Start+2P&display=swap';document.head.appendChild(f);setTimeout(function(){if(!document.fonts||document.fonts.status!=='loaded')document.documentElement.classList.add('fonts-failed')},3000)</script>
  <script>var s=localStorage.getItem('drift-theme');if(s==='dark')document.documentElement.className='dark';</script>
  <link rel="stylesheet" href="/static/css/animal.css">
  <link rel="alternate" type="application/rss+xml" title="DRIFT RSS" href="/rss.xml">
  <style>{{ pygments_css | safe }}</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-screen-logo" style="font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:32px;font-weight:600;letter-spacing:0.1em;background:none;width:auto;height:auto;animation:none;transform:none;">
    <span style="color:rgba(255,255,255,0.5);">></span> DRIFT
  </div>
</div>

<div class="progress-bar" id="progressBar"></div>

<nav class="nav-bar" id="navBar">
  <div class="nav-left">
    <a href="/" class="nav-brand">DRIFT</a>
    <div class="nav-links" id="navLinks">
      <a href="/" class="nav-link">文章</a>
      <a href="/notes" class="nav-link">便签</a>
      <a href="/editor" class="nav-link">写文章</a>
      <a href="/about" class="nav-link">关于</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="search-box" id="searchBox">
      <span class="search-box-icon">🔍</span>
      <input class="search-box-input" id="searchInput" placeholder="搜索文章..." autocomplete="off">
      <kbd class="search-box-kbd">⌘K</kbd>
      <div class="search-dropdown" id="searchDropdown">
        <div class="search-dropdown-results" id="searchResults"></div>
        <div class="search-dropdown-footer">
          <span>↑↓ 导航</span><span>↩ 打开</span><span>Esc 关闭</span>
        </div>
      </div>
    </div>
    <button class="nav-icon-btn" id="themeToggle" onclick="toggleTheme()" title="切换暗色模式" aria-label="切换暗色模式">🌙</button>
    <button class="nav-icon-btn" id="diceBtn" onclick="randomPost()" title="随机一篇文章" aria-label="随机文章">🎲</button>
    <button class="nav-hamburger" onclick="toggleMobileNav()" aria-label="菜单">☰</button>
  </div>
</nav>

<main class="container">
{% block content %}{% endblock %}
</main>

<footer>
  <div class="footer-wave">DRIFT · 建于 2026 · 慢下来，写点东西</div>
  <div class="footer">
    <a href="/rss.xml">RSS 订阅</a> · Animal Crossing inspired · Flask + Markdown
    <br>
    <span id="busuanzi_container_site_pv" style="display:none;">总访问 <span id="busuanzi_value_site_pv"></span> 次 · </span>
    <span id="busuanzi_container_site_uv" style="display:none;">访客 <span id="busuanzi_value_site_uv"></span> 人</span>
  </div>
</footer>

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

<!-- Fortune Widget -->
<div class="fortune-widget">
  <button class="fortune-btn" id="fortuneBtn" onclick="drawFortune()" title="每日运势签">🎋</button>
</div>

<!-- Island Clock -->
<div class="island-clock" id="islandClock">
  <div class="clock-date" id="clockDate"></div>
  <div class="clock-time" id="clockTime"></div>
  <div class="clock-label">DRIFT 时间</div>
</div>


<script src="/static/js/main.js" defer></script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

</body>
</html>
