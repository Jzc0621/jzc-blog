{% extends "base.html" %}
{% block title %}编辑 — JZC{% endblock %}
{% block content %}

<div class="page-header">
  <h1>{% if mode == "note" %}写便签{% else %}写文章{% endif %}</h1>
  <p class="subtitle">岛主专属</p>
</div>

<div class="card" style="max-width:480px;margin:0 auto;">

  <!-- Password gate -->
  <div id="loginGate">
    <div style="text-align:center;font-size:40px;margin-bottom:16px;">🏝️</div>
    <p style="text-align:center;color:var(--text-secondary);margin-bottom:20px;">请输入岛主密码</p>
    <input class="input input-lg" id="pwdInput" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')checkPwd()">
    <div class="flex-row gap-12" style="margin-top:12px;justify-content:center;">
      <button class="btn btn-primary" onclick="checkPwd()">进入岛屿</button>
      <a href="/" class="btn">返回</a>
    </div>
    <p id="pwdError" style="text-align:center;color:var(--error);font-size:12px;margin-top:10px;display:none;">密码不对哦</p>
  </div>

  <!-- Editor form (hidden initially) -->
  <div id="editorForm" style="display:none;">
    <form action="/editor/save" method="POST">
      <input type="hidden" name="mode" value="{{ mode }}">

      {% if mode == "post" %}
      <div class="mb-16">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">标题</label>
        <input class="input input-lg" name="title" placeholder="文章标题" required>
      </div>

      <div class="mb-16">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">分类</label>
        <select class="select" name="tag">
          <option value="技术">#技术</option>
          <option value="生活">#生活</option>
          <option value="随笔">#随笔</option>
          <option value="设计">#设计</option>
          <option value="其他">#其他</option>
        </select>
      </div>
      {% else %}
      <div class="mb-16">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">标题（可选）</label>
        <input class="input input-lg" name="title" placeholder="便签标题，留空则自动生成">
      </div>
      <input type="hidden" name="tag" value="便签">
      {% endif %}

      <div class="mb-16">
        <label style="font-size:12px;font-weight:700;color:var(--text-muted);display:block;margin-bottom:4px;">正文 (Markdown)</label>
        <textarea class="textarea" name="content" placeholder="在这里写内容...&#10;&#10;## 二级标题&#10;&#10;正文...&#10;&#10;```python&#10;print('hello')&#10;```" required></textarea>
      </div>

      <div class="flex-row gap-12">
        <button type="submit" class="btn btn-primary btn-lg">{% if mode == "note" %}保存便签{% else %}发布文章{% endif %}</button>
        <a href="/" class="btn">取消</a>
      </div>
    </form>
  </div>

</div>

<script>
// SHA-256 password verification
// To change password, generate a new hash:
//   python -c "import hashlib; print(hashlib.sha256('newpassword'.encode()).hexdigest())"
var PASSWORD_HASH = '0e7a5ad21c4ff6640d10f20362381f026788b60c4c15b3186457c7c122d804aa';

function sha256(message) {
  var msgBuffer = new TextEncoder().encode(message);
  return crypto.subtle.digest('SHA-256', msgBuffer).then(function(hashBuffer) {
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  });
}

function checkPwd() {
  var input = document.getElementById('pwdInput').value;
  sha256(input).then(function(hash) {
    if (hash === PASSWORD_HASH) {
      document.getElementById('loginGate').style.display = 'none';
      document.getElementById('editorForm').style.display = '';
    } else {
      document.getElementById('pwdError').style.display = '';
    }
  });
}
</script>

{% endblock %}
